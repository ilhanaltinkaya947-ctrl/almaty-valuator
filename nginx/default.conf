upstream app {
    server app:3000;
}

upstream n8n {
    server n8n:5678;
}

# Main app — almavykup.kz
server {
    listen 80;
    server_name almavykup.kz www.almavykup.kz;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name almavykup.kz www.almavykup.kz;

    ssl_certificate /etc/letsencrypt/live/almavykup.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/almavykup.kz/privkey.pem;

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# n8n — n8n.almavykup.kz
server {
    listen 80;
    server_name n8n.almavykup.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name n8n.almavykup.kz;

    ssl_certificate /etc/letsencrypt/live/almavykup.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/almavykup.kz/privkey.pem;

    location / {
        proxy_pass http://n8n;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
}
